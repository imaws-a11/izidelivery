<!doctype html>
<html lang="pt-BR" class="antialiased">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IZIDELIVERY - Mobilidade & Logística Premium</title>
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts: Plus Jakarta Sans & Outfit -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Icons: Material Symbols Outlined & Rounded -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0"
        rel="stylesheet" />

    <style>
        :root {
            --brand-yellow: #ffd900;
        }

        body {
            background-color: #f8f8f5;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', 'Outfit', sans-serif;
        }

        /* Glassmorphism primitives */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass-panel {
            background: rgba(35, 32, 15, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Utility for Material Symbols fill */
        .fill-1 {
            font-variation-settings: 'FILL' 1;
        }

        /* Scrollbar utilities */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Google Places Autocomplete Fixes */
        .pac-container {
            z-index: 9999999 !important;
            border-radius: 20px !important;
            margin-top: 5px !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15) !important;
            border: none !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            background-color: #ffffff !important;
        }
        .pac-item {
            padding: 12px 20px !important;
            font-size: 14px !important;
            cursor: pointer !important;
            border-top: 1px solid #f1f5f9 !important;
        }
        .pac-item:hover {
            background-color: #f8fafc !important;
        }
        .pac-item-query {
            font-size: 14px !important;
            font-weight: 700 !important;
            color: #1e293b !important;
        }
        .pac-matched {
            color: #2563eb !important;
        }
    </style>

    <!-- Mercado Pago SDK -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    
    <!-- QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <!-- Google Maps API é carregada via useJsApiLoader no React -->
</head>

<body class="bg-[#f8f8f5] dark:bg-[#23200f]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
